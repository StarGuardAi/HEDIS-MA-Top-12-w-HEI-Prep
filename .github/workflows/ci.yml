# AuditShield CI — lint, typecheck, test, security
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov pip-audit
          pip install -r Artifacts/project/auditshield/requirements.txt

      - name: Ruff lint
        run: ruff check Artifacts/project/auditshield/

      - name: Mypy typecheck
        run: mypy Artifacts/project/auditshield/ --strict --ignore-missing-imports

      - name: Pytest
        run: |
          cd Artifacts/project/auditshield && pytest tests/ -v --tb=short

      - name: Security audit
        run: pip-audit
